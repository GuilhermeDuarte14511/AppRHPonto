<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PontoPrecise - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-error-container": "#93000a",
              "inverse-primary": "#b4c5ff",
              "secondary-fixed-dim": "#b8c4ff",
              "on-primary-fixed-variant": "#003ea8",
              "error-container": "#ffdad6",
              "error": "#ba1a1a",
              "on-background": "#191c1e",
              "tertiary-container": "#bc4800",
              "on-tertiary-container": "#ffede6",
              "on-secondary-container": "#00217a",
              "secondary-container": "#708cfd",
              "on-secondary": "#ffffff",
              "primary-container": "#2563eb",
              "primary-fixed-dim": "#b4c5ff",
              "surface-bright": "#f7f9fb",
              "on-primary-container": "#eeefff",
              "surface-container-highest": "#e0e3e5",
              "on-surface-variant": "#434655",
              "surface-container-low": "#f2f4f6",
              "secondary-fixed": "#dde1ff",
              "on-tertiary-fixed-variant": "#7d2d00",
              "surface-container-high": "#e6e8ea",
              "outline": "#737686",
              "outline-variant": "#c3c6d7",
              "primary-fixed": "#dbe1ff",
              "on-error": "#ffffff",
              "surface-container": "#eceef0",
              "surface-tint": "#0053db",
              "surface-dim": "#d8dadc",
              "tertiary": "#943700",
              "tertiary-fixed": "#ffdbcd",
              "tertiary-fixed-dim": "#ffb596",
              "on-tertiary-fixed": "#360f00",
              "surface-variant": "#e0e3e5",
              "surface": "#f7f9fb",
              "on-secondary-fixed": "#001453",
              "inverse-on-surface": "#eff1f3",
              "secondary": "#3755c3",
              "on-tertiary": "#ffffff",
              "on-primary-fixed": "#00174b",
              "on-primary": "#ffffff",
              "on-secondary-fixed-variant": "#173bab",
              "background": "#f7f9fb",
              "surface-container-lowest": "#ffffff",
              "on-surface": "#191c1e",
              "primary": "#004ac6",
              "inverse-surface": "#2d3133"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-login-gradient {
            background: radial-gradient(circle at top left, #f7f9fb 0%, #dbe1ff 100%);
        }
        .primary-gradient-btn {
            background: linear-gradient(135deg, #004ac6 0%, #2563eb 100%);
        }
    </style>
</head>
<body class="bg-login-gradient font-body text-on-surface min-h-screen flex items-center justify-center p-6 antialiased">
<!-- Login Container -->
<main class="w-full max-w-md">
<div class="bg-surface-container-lowest rounded-full shadow-[0_20px_40px_rgba(0,74,198,0.06)] p-10 flex flex-col items-center">
<!-- Branding Area -->
<div class="mb-10 text-center">
<div class="mb-4 inline-flex items-center justify-center w-16 h-16 bg-primary-fixed rounded-xl">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="timer">timer</span>
</div>
<h1 class="font-headline text-2xl font-extrabold tracking-tight text-on-background mb-1">PontoPrecise</h1>
<p class="text-on-surface-variant text-sm font-medium tracking-wide">Precision Archive</p>
</div>
<!-- Login Form -->
<form class="w-full space-y-6">
<div class="space-y-4">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="block text-xs font-semibold text-on-surface-variant tracking-wider uppercase px-1" for="email">Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg" data-icon="mail">mail</span>
</div>
<input class="w-full pl-11 pr-4 py-3.5 bg-surface-container-low border-0 rounded-xl text-on-surface focus:ring-2 focus:ring-primary-fixed transition-all placeholder:text-outline/50" id="email" name="email" placeholder="nome@empresa.com.br" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<div class="flex justify-between items-center px-1">
<label class="block text-xs font-semibold text-on-surface-variant tracking-wider uppercase" for="password">Password</label>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg" data-icon="lock">lock</span>
</div>
<input class="w-full pl-11 pr-4 py-3.5 bg-surface-container-low border-0 rounded-xl text-on-surface focus:ring-2 focus:ring-primary-fixed transition-all placeholder:text-outline/50" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
</div>
<!-- Action Button -->
<button class="w-full primary-gradient-btn text-on-primary font-headline font-bold py-4 rounded-xl shadow-lg hover:shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    Entrar
                    <span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Footer Links -->
<div class="flex flex-col items-center gap-4 mt-8">
<a class="text-sm font-semibold text-primary hover:text-primary-container transition-colors" href="#">
                        Esqueci minha senha
                    </a>
<div class="flex items-center gap-2 mt-2">
<div class="h-px w-8 bg-outline-variant/30"></div>
<span class="text-[10px] font-bold text-outline uppercase tracking-widest">Acesso Corporativo</span>
<div class="h-px w-8 bg-outline-variant/30"></div>
</div>
</div>
</form>
</div>
<!-- System Status/Context -->
<footer class="mt-8 text-center space-y-4">
<div class="inline-flex items-center gap-2 px-3 py-1 bg-surface-container-high rounded-full">
<span class="w-2 h-2 bg-tertiary rounded-full animate-pulse"></span>
<span class="text-[11px] font-bold text-on-surface-variant tracking-wide">Sistema Operacional</span>
</div>
<p class="text-xs text-outline font-medium">
                © 2024 PontoPrecise. Todos os direitos reservados.
            </p>
</footer>
</main>
<!-- Visual Decorative Element (Asymmetric Tonal Layering) -->
<div class="fixed -bottom-24 -right-24 w-96 h-96 bg-primary-fixed/20 rounded-full blur-3xl -z-10"></div>
<div class="fixed -top-24 -left-24 w-96 h-96 bg-secondary-fixed/20 rounded-full blur-3xl -z-10"></div>
</body></html>
