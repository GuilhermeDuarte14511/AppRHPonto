<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-fixed": "#360f00",
                    "secondary": "#3755c3",
                    "surface-container-low": "#f2f4f6",
                    "on-primary": "#ffffff",
                    "inverse-on-surface": "#eff1f3",
                    "on-secondary-fixed": "#001453",
                    "surface-variant": "#e0e3e5",
                    "primary-fixed-dim": "#b4c5ff",
                    "tertiary-fixed-dim": "#ffb596",
                    "on-surface-variant": "#434655",
                    "surface-bright": "#f7f9fb",
                    "inverse-primary": "#b4c5ff",
                    "primary-container": "#2563eb",
                    "on-secondary-fixed-variant": "#173bab",
                    "surface-dim": "#d8dadc",
                    "outline": "#737686",
                    "on-tertiary-container": "#ffede6",
                    "on-tertiary-fixed-variant": "#7d2d00",
                    "surface": "#f7f9fb",
                    "secondary-fixed-dim": "#b8c4ff",
                    "outline-variant": "#c3c6d7",
                    "error": "#ba1a1a",
                    "on-primary-fixed-variant": "#003ea8",
                    "tertiary-fixed": "#ffdbcd",
                    "tertiary": "#943700",
                    "primary-fixed": "#dbe1ff",
                    "on-primary-fixed": "#00174b",
                    "surface-tint": "#0053db",
                    "secondary-fixed": "#dde1ff",
                    "on-surface": "#191c1e",
                    "background": "#f7f9fb",
                    "surface-container": "#eceef0",
                    "on-tertiary": "#ffffff",
                    "tertiary-container": "#bc4800",
                    "surface-container-high": "#e6e8ea",
                    "error-container": "#ffdad6",
                    "primary": "#004ac6",
                    "on-primary-container": "#eeefff",
                    "on-background": "#191c1e",
                    "on-error": "#ffffff",
                    "on-secondary": "#ffffff",
                    "inverse-surface": "#2d3133",
                    "on-secondary-container": "#00217a",
                    "on-error-container": "#93000a",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-highest": "#e0e3e5",
                    "secondary-container": "#708cfd"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; background-color: #f7f9fb; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-nav {
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .tabular-nums {
            font-variant-numeric: tabular-nums;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-surface antialiased pb-32">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-[#f7f9fb] dark:bg-slate-950">
<div class="flex justify-between items-center px-6 py-4 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-3">
<button class="material-symbols-outlined text-blue-600 dark:text-blue-400 active:scale-95 duration-200" data-icon="menu">menu</button>
<h1 class="font-['Inter'] font-semibold tracking-tight text-on-surface text-lg">Resumo da Marcação</h1>
</div>
<div class="h-10 w-10 rounded-full bg-surface-container overflow-hidden">
<img alt="Employee Profile Avatar" class="w-full h-full object-cover" data-alt="Professional portrait of a male employee with a warm smile in a corporate environment" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC4T5oe-qi9oNQVBaBJNq-nP2y3t_eBWkJJ0zrmdHLyoMrXeoRIJC_x8AOYCxU-7F1O6ck6SBEvOUM4aVTl5nGy2ZMulaOtf9Fa-_0HaGqkFVOqo5a05BQmjJ_svYuAlGE9VU7ITQPuxf25FbBRhDDltm2lB2aNIPwPHI3-YJCKTP0SSNTXqgk_vKpLHQqE3fzIxMyutm5uPrfFkyni7wM44ATxTFcb3WE9N2EFgECoyRkYwcelupyEyRgzfTFOe7YePyOKaViY9W8"/>
</div>
</div>
</header>
<main class="max-w-md mx-auto px-6 pt-6 flex flex-col gap-8">
<!-- Photo Preview Section -->
<section class="flex flex-col gap-4">
<div class="relative w-full aspect-square bg-surface-container-low rounded-3xl overflow-hidden shadow-[0_12px_32px_rgba(0,74,198,0.06)] border border-white/40">
<img class="w-full h-full object-cover grayscale-[20%]" data-alt="Modern high-resolution biometric facial recognition portrait of a young professional in bright daylight office setting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCI9FPyxnafCWs8pnyI-QR0p_OL0jR64Se_OCTF4szn_YQyNWfYC-2-8Gpy0iqRzbNH4u6uMpc10x4EfDTBX61vJPL-LZJVnzOf4Kme8RIpDVceMvLH2AmPjPK8GNIAtIDmuTqQChNg_cg7cHeXYrTinT8vfIQPKzReyF1xDNlsCrfTQ9csfE5Q_zm952ERpyJfNOssEOn7eTA1GKkNUjlk8YDmIujXnGJPfC9QTon6-ldnoMoxZqssqNvAly4BRKbPmnKG7Dcb0dE"/>
<div class="absolute bottom-4 left-4 right-4 flex justify-center">
<button class="bg-white/90 backdrop-blur-md px-5 py-2.5 rounded-full flex items-center gap-2 text-sm font-semibold text-primary hover:bg-white transition-colors shadow-sm active:scale-95 duration-200">
<span class="material-symbols-outlined text-lg" data-icon="photo_camera">photo_camera</span>
                        Repetir Foto
                    </button>
</div>
</div>
</section>
<!-- Real-time Data Card (Chronometer and Location) -->
<section class="grid grid-cols-1 gap-4">
<div class="bg-surface-container-lowest p-6 rounded-3xl shadow-[0_12px_32px_rgba(0,74,198,0.06)] flex flex-col gap-4 relative overflow-hidden">
<!-- Primary Blue Accent -->
<div class="absolute left-0 top-0 bottom-0 w-1 bg-primary"></div>
<div class="flex flex-col">
<span class="text-[10px] font-bold tracking-[0.1em] uppercase text-on-surface-variant mb-1">Horário Atual</span>
<div class="text-5xl font-extrabold tracking-tighter tabular-nums text-primary leading-none">08:42:15</div>
</div>
<div class="flex items-start gap-3 mt-2">
<div class="bg-primary/10 p-2 rounded-xl text-primary">
<span class="material-symbols-outlined" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<div class="flex flex-col">
<span class="text-[10px] font-bold tracking-[0.1em] uppercase text-on-surface-variant">Localização Atual</span>
<p class="text-sm font-medium text-on-surface">Av. Brigadeiro Faria Lima, 3477, Itaim Bibi, São Paulo - SP</p>
</div>
</div>
<!-- Tiny Map Preview -->
<div class="w-full h-24 rounded-2xl overflow-hidden mt-2">
<img class="w-full h-full object-cover" data-alt="Aerial topographic map of a city street layout with minimalist blue aesthetic" data-location="São Paulo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBD-BTGFonC2m6x43juifjvg73TA5cvf4eBHaC3W7FWgD6YglVtRqSHymSp6Ij0m8u8cYXCGA-oo1hdUSARpj7K3Gk6rwUWayEYZ1Wxcouy77g963-VaH4VwBBn6ByfpaV_G0Zgh5VfepvCo3361WLSxFa40c1m6n9jPtn924JftZ98Jn1BkoDzJEwlm7vtGxeijt_CKJp7891BiiXVBd7UQJe970FHxEFnIEC_kt4j0L_JyQMkUe7hh7FsNdjqo_j3EJWrMeyNUJw"/>
</div>
</div>
</section>
<!-- Clock-in Type Selector -->
<section class="flex flex-col gap-4">
<span class="text-[10px] font-bold tracking-[0.1em] uppercase text-on-surface-variant px-2">Tipo de Marcação</span>
<div class="grid grid-cols-2 gap-3">
<!-- Active Type -->
<button class="bg-primary-container text-on-primary-container p-4 rounded-2xl flex flex-col items-center gap-2 transition-all shadow-sm ring-2 ring-primary">
<span class="material-symbols-outlined text-2xl" data-icon="login" style="font-variation-settings: 'FILL' 1;">login</span>
<span class="text-sm font-bold">Entrada</span>
</button>
<button class="bg-surface-container-lowest text-on-surface-variant p-4 rounded-2xl flex flex-col items-center gap-2 transition-all hover:bg-surface-container-high">
<span class="material-symbols-outlined text-2xl" data-icon="restaurant">restaurant</span>
<span class="text-sm font-semibold">Saída Almoço</span>
</button>
<button class="bg-surface-container-lowest text-on-surface-variant p-4 rounded-2xl flex flex-col items-center gap-2 transition-all hover:bg-surface-container-high">
<span class="material-symbols-outlined text-2xl" data-icon="work">work</span>
<span class="text-sm font-semibold">Retorno Almoço</span>
</button>
<button class="bg-surface-container-lowest text-on-surface-variant p-4 rounded-2xl flex flex-col items-center gap-2 transition-all hover:bg-surface-container-high">
<span class="material-symbols-outlined text-2xl" data-icon="logout">logout</span>
<span class="text-sm font-semibold">Saída</span>
</button>
</div>
</section>
<!-- Confirmation Button -->
<section class="mt-4 mb-8">
<button class="w-full py-5 bg-gradient-to-br from-primary to-primary-container text-white font-bold rounded-2xl shadow-[0_12px_32px_rgba(0,74,198,0.2)] active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                Confirmar Marcação
                <span class="material-symbols-outlined" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<p class="text-center text-[11px] text-on-surface-variant mt-4 px-6">
                Ao confirmar, seus dados de biometria e geolocalização serão registrados para fins de controle de jornada.
            </p>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center pb-8 px-4">
<div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md rounded-full border border-white/20 bg-[#f7f9fb]/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-[0_12px_32px_rgba(0,74,198,0.06)] flex justify-between items-center px-4 py-2">
<!-- Tracker (Active) -->
<button class="flex flex-col items-center justify-center bg-blue-600 text-white rounded-full p-3 scale-110 -translate-y-2 transition-all">
<span class="material-symbols-outlined" data-icon="timer" style="font-variation-settings: 'FILL' 1;">timer</span>
<span class="font-['Inter'] text-[10px] font-medium tracking-widest uppercase mt-0.5">Tracker</span>
</button>
<!-- History -->
<button class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 p-2 hover:text-blue-500 transition-colors">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-['Inter'] text-[10px] font-medium tracking-widest uppercase mt-0.5">History</span>
</button>
<!-- Projects -->
<button class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 p-2 hover:text-blue-500 transition-colors">
<span class="material-symbols-outlined" data-icon="assignment">assignment</span>
<span class="font-['Inter'] text-[10px] font-medium tracking-widest uppercase mt-0.5">Projects</span>
</button>
<!-- Settings -->
<button class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 p-2 hover:text-blue-500 transition-colors">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-['Inter'] text-[10px] font-medium tracking-widest uppercase mt-0.5">Settings</span>
</button>
</div>
</nav>
</body></html>
