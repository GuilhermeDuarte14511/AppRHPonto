<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ponto Eletrônico - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-container": "#bc4800",
                        "tertiary-fixed": "#ffdbcd",
                        "on-secondary": "#ffffff",
                        "on-surface": "#191c1e",
                        "surface-dim": "#d8dadc",
                        "surface-container-highest": "#e0e3e5",
                        "on-primary-container": "#eeefff",
                        "surface-variant": "#e0e3e5",
                        "on-secondary-fixed": "#001453",
                        "surface-tint": "#0053db",
                        "secondary-fixed-dim": "#b8c4ff",
                        "on-primary": "#ffffff",
                        "primary": "#004ac6",
                        "secondary-fixed": "#dde1ff",
                        "inverse-on-surface": "#eff1f3",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-container": "#00217a",
                        "outline-variant": "#c3c6d7",
                        "surface-container-low": "#f2f4f6",
                        "on-surface-variant": "#434655",
                        "secondary": "#3755c3",
                        "surface-container": "#eceef0",
                        "secondary-container": "#708cfd",
                        "outline": "#737686",
                        "on-tertiary-fixed": "#360f00",
                        "on-tertiary": "#ffffff",
                        "background": "#f7f9fb",
                        "primary-fixed": "#dbe1ff",
                        "tertiary-fixed-dim": "#ffb596",
                        "surface": "#f7f9fb",
                        "on-tertiary-container": "#ffede6",
                        "primary-fixed-dim": "#b4c5ff",
                        "on-secondary-fixed-variant": "#173bab",
                        "primary-container": "#2563eb",
                        "error-container": "#ffdad6",
                        "on-error": "#ffffff",
                        "surface-bright": "#f7f9fb",
                        "inverse-primary": "#b4c5ff",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "surface-container-high": "#e6e8ea",
                        "inverse-surface": "#2d3133",
                        "tertiary": "#943700",
                        "error": "#ba1a1a",
                        "on-background": "#191c1e",
                        "on-primary-fixed": "#00174b",
                        "on-primary-fixed-variant": "#003ea8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom surface layering for login canvas */
        .login-canvas {
            background: linear-gradient(135deg, #f7f9fb 0%, #e0e7ff 100%);
        }
        /* Soft inset style from Design System */
        .input-inset {
            background-color: #e6e8ea;
            transition: all 0.2s ease;
        }
        .input-inset:focus-within {
            background-color: #ffffff;
            border-left: 3px solid #004ac6;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased">
<!-- Main Focus Canvas -->
<main class="min-h-screen flex items-center justify-center login-canvas p-6">
<!-- Login Container -->
<div class="w-full max-w-md">
<!-- Branding Header -->
<div class="flex flex-col items-center mb-12 text-center">
<!-- Placeholder Logo - Executive Editorial Style -->
<div class="w-16 h-16 bg-gradient-to-br from-primary to-primary-container rounded-2xl flex items-center justify-center mb-6 shadow-[0_12px_32px_rgba(0,74,198,0.15)]">
<span class="material-symbols-outlined text-white text-4xl" data-icon="schedule" style="font-variation-settings: 'FILL' 1;">schedule</span>
</div>
<h1 class="font-headline text-3xl font-black tracking-tighter text-on-surface">
                    Ponto Eletrônico
                </h1>
<p class="text-on-surface-variant font-body text-sm mt-2 tracking-wide">
                    GESTÃO DE TEMPO COM PRECISÃO
                </p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-[24px] p-8 md:p-10 shadow-[0_-12px_32px_rgba(0,74,198,0.06)] relative overflow-hidden">
<!-- Welcome Message -->
<div class="mb-8">
<h2 class="text-xl font-semibold text-on-surface tracking-tight">Seja bem-vindo</h2>
<p class="text-on-surface-variant text-sm mt-1">Insira suas credenciais para acessar sua conta.</p>
</div>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label text-[10px] uppercase font-bold tracking-[0.1em] text-on-surface-variant" for="email">E-mail Corporativo</label>
<div class="input-inset flex items-center px-4 py-3.5 rounded-xl">
<span class="material-symbols-outlined text-outline mr-3 text-[20px]" data-icon="mail">mail</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface placeholder:text-outline text-sm font-medium" id="email" placeholder="nome@empresa.com.br" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label text-[10px] uppercase font-bold tracking-[0.1em] text-on-surface-variant" for="password">Senha</label>
<a class="text-[11px] font-semibold text-primary hover:text-primary-container transition-colors tracking-tight" href="#">Esqueci minha senha</a>
</div>
<div class="input-inset flex items-center px-4 py-3.5 rounded-xl">
<span class="material-symbols-outlined text-outline mr-3 text-[20px]" data-icon="lock">lock</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface placeholder:text-outline text-sm font-medium" id="password" placeholder="••••••••" type="password"/>
<button class="text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me (Low Chroma Style) -->
<div class="flex items-center space-x-2 px-1">
<div class="relative flex items-center">
<input class="w-4 h-4 rounded border-none bg-surface-container-high text-primary focus:ring-0 focus:ring-offset-0" id="remember" type="checkbox"/>
</div>
<label class="text-sm font-medium text-on-surface-variant cursor-pointer" for="remember">Lembrar acesso neste dispositivo</label>
</div>
<!-- Submit Button (Primary Gradient Style) -->
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-white py-4 rounded-xl font-semibold text-base shadow-[0_12px_32px_rgba(0,74,198,0.12)] active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4" type="submit">
                        Entrar
                        <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Help Link -->
<div class="mt-10 pt-6 border-t border-outline-variant/15 text-center">
<p class="text-xs text-on-surface-variant">
                        Não consegue acessar? <a class="text-primary font-bold" href="#">Fale com o RH</a>
</p>
</div>
</div>
<!-- Footer Meta -->
<div class="mt-8 flex justify-center space-x-6 text-[10px] font-medium tracking-[0.05em] uppercase text-on-surface-variant/60">
<a class="hover:text-primary transition-colors" href="#">Termos de Uso</a>
<a class="hover:text-primary transition-colors" href="#">Privacidade</a>
<span>v2.4.0</span>
</div>
</div>
</main>
<!-- Visual Background Element (Asymmetric Depth) -->
<div class="fixed top-[-10%] right-[-5%] w-[400px] h-[400px] bg-primary/5 blur-[120px] rounded-full pointer-events-none z-[-1]"></div>
<div class="fixed bottom-[-10%] left-[-5%] w-[300px] h-[300px] bg-secondary/5 blur-[100px] rounded-full pointer-events-none z-[-1]"></div>
</body></html>
