        }
        .surface-shift-no-border {
            border: none !important;
        }
        .tonal-transition-no-border {
            border: none !important;
        }
    </style>

    body {
      min-height: max(884px, 100dvh);
    }

<header class="w-full sticky top-0 z-50 bg-[#f7f9fb] dark:bg-slate-950 flex justify-between items-center px-6 py-4 tonal-transition-no-border flat-no-shadows">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full overflow-hidden">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="Close up portrait of a professional man in a business casual shirt with soft natural lighting and blurred background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDhBniPkF4cb4EXlCntz_fGoKyeqg3h-W8mmDaVp2PFeGND292Yn7yZEOcXrIPyACq3eyyitKZNX16XIodAbn9TO3g09rlrnOsTgiQT2cTHxMrt0wI8vW4mBjXu0IpmCElI4TqVkyXK9pm-hnugVmrKZBMuIeFz9JgMgiOfknq3EIWdENTmR7QQm6iXwfQElnnVv-ddgHX8LvrdVTjBWHK0h2sdkeZbAhacqNawbrKMq3i5YKrrb-2W7Rzbu3mXy1OJLpP02mIGkog"/>
</div>
<h1 class="font-['Inter'] text-lg font-semibold tracking-tight text-blue-700 dark:text-blue-400 font-black tracking-tighter">Ponto Eletrônico</h1>
</div>
<div class="flex items-center gap-4">
<button class="text-slate-500 hover:opacity-80 transition-opacity tap-highlight-none">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex flex-col items-center justify-center px-8 pb-24">
<!-- Empty State Container -->
<div class="max-w-md w-full flex flex-col items-center text-center space-y-8">
<!-- Architectural Illustration Component -->
<div class="relative w-64 h-64 flex items-center justify-center">
<!-- Decorative Layered Shapes -->
<div class="absolute inset-0 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute top-4 right-4 w-12 h-12 bg-secondary-container/20 rounded-xl rotate-12"></div>
<div class="absolute bottom-8 left-0 w-16 h-16 bg-primary-fixed/30 rounded-2xl -rotate-12"></div>
<!-- Central Icon Concept -->
<div class="relative z-10 w-40 h-40 bg-surface-container-lowest rounded-[2rem] shadow-[0_12_32_rgba(0,74,198,0.06)] flex items-center justify-center group overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent"></div>
<span class="material-symbols-outlined text-[80px] text-primary/20 absolute -bottom-4 -right-4 rotate-12" data-icon="calendar_today">calendar_today</span>
<span class="material-symbols-outlined text-[64px] text-primary transition-transform" data-icon="history">history</span>
</div>
</div>
<!-- Typography Content -->
<div class="space-y-3">
<h2 class="text-2xl md:text-3xl font-headline font-bold text-on-surface tracking-tight">Sem marcações ainda</h2>
<p class="text-on-surface-variant font-body leading-relaxed max-w-[280px] mx-auto">
                    Suas marcações aparecerão aqui após seu primeiro registro.
                </p>
</div>
<!-- Action Area -->
<div class="pt-4 w-full flex flex-col items-center space-y-6">
<!-- Precision Architect Button Style -->
<button class="group relative px-8 py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary rounded-2xl font-semibold tracking-tight shadow-[0_12px_32px_rgba(0,74,198,0.15)] active:scale-95 transition-all overflow-hidden w-full sm:w-auto">
<div class="relative z-10 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl" data-icon="add_circle">add_circle</span>
<span>Registrar Primeiro Ponto</span>
</div>
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
<button class="text-on-surface-variant font-label text-sm tracking-[0.05em] uppercase font-bold hover:text-primary transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-lg" data-icon="help">help</span>
                    Como funciona?
                </button>
</div>
<!-- Bento Grid Preview (Faded) -->
<div class="w-full mt-12 opacity-30 select-none pointer-events-none grid grid-cols-2 gap-4">
<div class="p-4 bg-surface-container-low rounded-xl h-24 flex flex-col justify-end">
<div class="w-1/2 h-2 bg-outline-variant/30 rounded-full mb-2"></div>
<div class="w-full h-3 bg-outline-variant/30 rounded-full"></div>
</div>
<div class="p-4 bg-surface-container-low rounded-xl h-24 flex flex-col justify-end">
<div class="w-1/2 h-2 bg-outline-variant/30 rounded-full mb-2"></div>
<div class="w-full h-3 bg-outline-variant/30 rounded-full"></div>
</div>
</div>
</div>

<nav class="fixed bottom-0 w-full z-50 rounded-t-[24px] bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-[0_-12px_32px_rgba(0,74,198,0.06)] surface-shift-no-border">
<div class="flex justify-around items-center px-6 pb-6 pt-3">
<!-- Marcações Active -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-4 py-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 scale-95 active:scale-90 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="home_app_logo">home_app_logo</span>
<span class="font-['Inter'] text-[10px] tracking-wider uppercase font-medium mt-1">Início</span>
</a>
<a class="flex flex-col items-center justify-center bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 rounded-2xl px-4 py-1.5 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="history" style="font-variation-settings: 'FILL' 1;">history</span>
<span class="font-['Inter'] text-[10px] tracking-wider uppercase font-medium mt-1">Marcações</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-4 py-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 scale-95 active:scale-90 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="edit_document">edit_document</span>
<span class="font-['Inter'] text-[10px] tracking-wider uppercase font-medium mt-1">Justificativas</span>

<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-4 py-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 scale-95 active:scale-90 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
<span class="font-['Inter'] text-[10px] tracking-wider uppercase font-medium mt-1">Perfil</span>
</a>
</div>
</nav>
