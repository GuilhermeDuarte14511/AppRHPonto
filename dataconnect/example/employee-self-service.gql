query ListEmployeeNotifications($userId: UUID!)
  @auth(level: USER, insecureReason: "OperaÃ§Ã£o do aplicativo do colaborador para central de mensagens.") {
  adminNotifications(
    where: { recipientUserId: { eq: $userId } }
    orderBy: [{ triggeredAt: DESC }]
    limit: 50
  ) {
    id
    category
    title
    description
    href
    entityName
    entityId
    severity
    status
    triggeredAt
    readAt
    createdAt
    updatedAt
  }
}

mutation MarkEmployeeNotificationAsRead($id: UUID!)
  @auth(level: USER, insecureReason: "OperaÃ§Ã£o do aplicativo do colaborador para leitura de mensagens.") {
  adminNotification_update(
    id: $id
    data: {
      status: "read"
      readAt_expr: "request.time"
      updatedAt_expr: "request.time"
    }
  )
}

